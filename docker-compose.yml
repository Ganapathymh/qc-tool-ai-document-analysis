version: '3.8'

services:
  technical-spec-engine:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_N8N_WEBHOOK_URL=https://YOUR_N8N_INSTANCE/webhook/qc-tool-upload
    restart: always
    container_name: technical-spec-engine
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
